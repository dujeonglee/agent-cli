<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-cli</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <span id="info">connecting…</span>
    <span id="token-usage" title="token usage"></span>
    <button id="inspector-btn" type="button" title="Prompt Inspector">⚡</button>
    <button id="export-btn" type="button" title="Export conversation">📤</button>
    <button id="download-btn" type="button" title="Download workspace files">📥</button>
    <span id="viewers" title="connected viewers"></span>
    <span id="conn-status" title="connection status">●</span>
  </header>
  <main id="messages"></main>

  <!-- Export selection action bar (shown only in export mode) -->
  <div id="export-bar" hidden>
    <label class="exp-all"><input type="checkbox" id="export-all"> All</label>
    <span id="export-count">0 selected</span>
    <span class="exp-actions">
      <button id="export-html" type="button" title="Download as HTML">⬇ HTML</button>
      <button id="export-jira-btn" type="button" title="Post as Jira comment">Jira…</button>
      <button id="export-cancel" type="button" title="Cancel">✕</button>
    </span>
    <span id="export-jira-form" hidden>
      <select id="export-jira-target" title="Jira instance"></select>
      <input id="export-jira-issue" type="text" placeholder="ISSUE-123" autocomplete="off">
      <button id="export-jira-send" type="button">Send</button>
    </span>
    <span id="export-msg" class="exp-msg"></span>
  </div>

  <!-- Workspace download drawer -->
  <div id="download-backdrop" hidden></div>
  <aside id="download-drawer" aria-hidden="true">
    <div class="dl-head">
      <div class="dl-title">📥 Download</div>
      <button id="dl-close" type="button" title="Close">✕</button>
    </div>
    <label class="dl-all"><input type="checkbox" id="dl-all"> All (whole workspace)</label>
    <div id="dl-tree" class="dl-tree"></div>
    <div class="dl-foot">
      <span id="dl-count">0 selected</span>
      <button id="dl-download" type="button" title="Download as zip">⬇ Download zip</button>
    </div>
    <div id="dl-msg" class="dl-msg"></div>
  </aside>

  <!-- Prompt Inspector drawer -->
  <div id="inspector-backdrop" hidden></div>
  <aside id="inspector" aria-hidden="true">
    <div class="insp-head">
      <div class="insp-title">⚡ Prompt Inspector</div>
      <div id="insp-meta" class="insp-meta"></div>
      <button id="insp-close" type="button" title="Close">✕</button>
    </div>
    <div id="insp-scopes" class="insp-scopes" title="System prompt scope — main loop or a delegate sub-agent"></div>
    <div id="insp-budget" class="insp-budget" title="per-section token share"></div>
    <input id="insp-search" type="search" placeholder="Filter sections…" autocomplete="off">
    <div id="insp-sections" class="insp-sections"></div>
  </aside>
  <footer>
    <div id="input-mode-badge"></div>
    <div id="input-area">
      <textarea id="input"
                placeholder="Type a message — Enter to send, Shift+Enter for newline"
                rows="3"></textarea>
      <button id="send" type="button">Send</button>
      <button id="abort" type="button" hidden>Stop</button>
    </div>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
