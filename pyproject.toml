[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-cli"
version = "2.0.0-dev"
description = "ReAct pattern agentic loop CLI for on-premise LLMs"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9",
    "rich>=13.0",
    "requests>=2.28",
    "pyyaml>=6.0",
    "tree-sitter>=0.23",
    "tree-sitter-python>=0.23",
    "tree-sitter-javascript>=0.23",
    "tree-sitter-typescript>=0.23",
    "tree-sitter-cpp>=0.23",
    "tree-sitter-markdown>=0.3",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]
# macOS: install gnureadline for proper CJK width in chat input
macos = ["gnureadline>=8.0; sys_platform == 'darwin'"]

[project.scripts]
agent-cli = "agent_cli.main:app"

[tool.setuptools.packages.find]
include = ["agent_cli*"]

[tool.setuptools.package-data]
agent_cli = ["default_models.json"]

[tool.pytest.ini_options]
markers = [
    "ollama_integration: requires running Ollama at localhost:11434",
]
