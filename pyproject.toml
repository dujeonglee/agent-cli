[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-cli"
version = "2.0.0-dev"
description = "ReAct pattern agentic loop CLI for on-premise LLMs"
requires-python = ">=3.10"
dependencies = [
    "typer>=0.9",
    "rich>=13.0",
    "requests>=2.28",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
agent-cli = "agent_cli.main:app"

[tool.setuptools.packages.find]
include = ["agent_cli*"]

[tool.pytest.ini_options]
markers = [
    "ollama_integration: requires running Ollama at localhost:11434",
]
