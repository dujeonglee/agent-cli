name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # ``[web]`` brings in fastapi / uvicorn / sse-starlette which
        # the web-surface tests (test_web_server, test_web_renderer,
        # test_dispatch_agent_or_skill) import at module level. Without
        # them pytest fails collection — the web extra ships in this
        # repo so CI must validate it.
        run: pip install -e ".[dev,web]"

      - name: Run unit tests
        run: pytest tests/ -m "not ollama_integration" -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check agent_cli/ tests/

      - name: Run ruff format check
        run: ruff format --check agent_cli/ tests/
